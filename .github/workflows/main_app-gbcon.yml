# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-gbcon

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: crslee.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_20DAD8ACE7FC4E7EAC70134885A928D6 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_26A1915B790B4F4DA30A59CC2B941D2D }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: crslee.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_20DAD8ACE7FC4E7EAC70134885A928D6 }}/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_6DEA0CC588A34A549774DFA5FDD8AFB4 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_7B0636A377C84A5688FAE6F5C17EB0CB }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C6D753D821FA49FE98EF4FC9693BE061 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-gbcon'
          slot-name: 'Production'
          images: 'crslee.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_20DAD8ACE7FC4E7EAC70134885A928D6 }}/guestbook:${{ github.sha }}'
          